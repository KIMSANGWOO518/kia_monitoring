<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>타사 도로 검토 뷰어</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;height:100vh;font-family:'Malgun Gothic',sans-serif;overflow:hidden}
#sidebar{width:320px;min-width:320px;display:flex;flex-direction:column;background:#fff;box-shadow:2px 0 8px rgba(0,0,0,.12);z-index:10}
.sb-head{background:#1B3A5C;color:#fff;padding:12px 14px}
.sb-head-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.sb-back{background:none;border:none;color:#fff;opacity:.7;cursor:pointer;font-size:13px;padding:0;line-height:1}
.sb-back:hover{opacity:1}
.sb-head h1{font-size:14px;font-weight:700}
.sb-head p{font-size:10px;opacity:.7;margin-top:2px}
.stats{display:flex;gap:5px;padding:8px;background:#f7f8fc;border-bottom:1px solid #eee}
.sc{flex:1;background:#fff;border:2px solid #eee;border-radius:7px;padding:7px 3px;text-align:center;cursor:pointer;transition:.15s}
.sc:hover{border-color:#aaa}
.sc.active-all{background:#555;border-color:#555;color:#fff}
.sc.active-owned{background:#27AE60;border-color:#27AE60;color:#fff}
.sc.active-unowned{background:#E74C3C;border-color:#E74C3C;color:#fff}
.sc.active-none{background:#888;border-color:#888;color:#fff}
.sc-num{font-size:18px;font-weight:700}
.sc-lbl{font-size:10px;margin-top:1px;opacity:.85}
.save-bar{padding:6px 8px;border-bottom:1px solid #eee;display:flex;gap:5px}
.btn-save{flex:1;padding:6px;background:#1B3A5C;color:#fff;border:none;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit}
.btn-save:hover{background:#2a5080}
.btn-export{padding:6px 10px;background:#fff;color:#555;border:1px solid #ccc;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit}
.btn-export:hover{background:#f5f5f5}
.export-wrap{position:relative}
#export-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:#fff;border:1px solid #ddd;
  border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:300;min-width:150px;overflow:hidden}
#export-menu button{display:block;width:100%;padding:9px 12px;background:none;border:none;text-align:left;
  font-size:11px;cursor:pointer;font-family:inherit;color:#333}
#export-menu button:hover{background:#f0f4ff}
.search{padding:6px 8px;border-bottom:1px solid #eee}
.search input{width:100%;padding:6px 10px;border:1px solid #ddd;border-radius:5px;font-size:12px;outline:none}
.search input:focus{border-color:#1B3A5C}
#road-list{flex:1;overflow-y:auto}
.ri{padding:9px 12px;border-bottom:1px solid #f0f0f0;cursor:pointer;border-left:3px solid transparent}
.ri:hover{background:#f5f8ff}
.ri.active{background:#EEF2FF;border-left-color:#1B3A5C}
.ri-top{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.ri-id{font-size:12px;font-weight:600;color:#1B3A5C;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-select{font-size:10px;padding:2px 5px;border-radius:4px;border:1px solid #ccc;
  cursor:pointer;outline:none;background:#f8f9fa;color:#555;font-family:inherit;flex-shrink:0}
.status-select.s-owned{background:#D4EDDA;color:#155724;border-color:#b7dfb8}
.status-select.s-unowned{background:#F8D7DA;color:#721C24;border-color:#f1b0b7}
.ri-sub{font-size:11px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-meta{font-size:10px;color:#aaa;margin-top:1px}
#map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}
#overlay{position:fixed;top:0;left:320px;right:0;bottom:0;pointer-events:none;z-index:5}
#popup{position:absolute;top:14px;right:14px;width:270px;background:#fff;border-radius:9px;
  box-shadow:0 4px 18px rgba(0,0,0,.18);display:none;z-index:200;overflow:hidden}
.pop-head{background:#1B3A5C;color:#fff;padding:10px 13px;display:flex;align-items:center;justify-content:space-between}
.pop-head h3{font-size:13px;line-height:1.4;word-break:keep-all}
.pop-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;opacity:.8}
.pop-body{padding:10px 13px}
.pop-row{display:flex;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:11px}
.pop-row:last-child{border:none}
.pop-k{color:#999;width:75px;flex-shrink:0}
.pop-v{color:#333;font-weight:500;word-break:break-all}
.no-result{text-align:center;padding:30px;color:#bbb;font-size:12px}
.pop-dl{display:block;width:100%;margin-top:8px;padding:7px 0;background:#1B3A5C;color:#fff;
  border:none;border-radius:5px;font-size:12px;cursor:pointer;text-align:center}
.pop-dl:hover{background:#2a5080}
#init-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:#f0f2f5;z-index:999;font-family:'Malgun Gothic',sans-serif}
.init-box{text-align:center;color:#555}
.init-spinner{width:32px;height:32px;border:3px solid #ddd;border-top-color:#1B3A5C;
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.init-err{color:#c0392b;font-size:14px;line-height:1.8}
.init-err a{color:#1B3A5C}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;
  padding:9px 20px;border-radius:20px;font-size:12px;z-index:9999;display:none;
  pointer-events:none;font-family:'Malgun Gothic',sans-serif;white-space:nowrap}
</style>
</head>
<body>

<div id="init-screen">
  <div class="init-box">
    <div class="init-spinner"></div>
    <div id="init-msg">데이터를 불러오는 중…</div>
  </div>
</div>

<div id="toast"></div>

<div id="sidebar">
  <div class="sb-head">
    <div class="sb-head-top">
      <button class="sb-back" onclick="location.href='index.html'">← 목록</button>
      <h1>타사 도로 검토 뷰어</h1>
    </div>
    <p id="sb-subtitle">-</p>
  </div>

  <div class="stats">
    <div class="sc active-all" data-f="all" onclick="setFilter('all')">
      <div class="sc-num" id="cnt-all">0</div><div class="sc-lbl">전체</div>
    </div>
    <div class="sc" data-f="owned" onclick="setFilter('owned')">
      <div class="sc-num" id="cnt-owned">0</div><div class="sc-lbl">보유</div>
    </div>
    <div class="sc" data-f="unowned" onclick="setFilter('unowned')">
      <div class="sc-num" id="cnt-unowned">0</div><div class="sc-lbl">미보유</div>
    </div>
    <div class="sc" data-f="none" onclick="setFilter('none')">
      <div class="sc-num" id="cnt-none">0</div><div class="sc-lbl">미검토</div>
    </div>
  </div>

  <div class="save-bar">
    <button class="btn-save" onclick="saveStatusToKV()">저장 (공유)</button>
    <div class="export-wrap">
      <button class="btn-export" onclick="toggleExportMenu(event)">내보내기 ▾</button>
      <div id="export-menu">
        <button onclick="exportData()">JSON 파일 (.json)</button>
        <button onclick="exportXLSX()">Excel 파일 (.xlsx)</button>
      </div>
    </div>
  </div>

  <div class="search">
    <input type="text" id="q" placeholder="update_id, 노선명, 구간내용 검색…" oninput="applyFilters()">
  </div>
  <div id="road-list"></div>
</div>

<canvas id="overlay"></canvas>
<div id="map-wrap">
  <div id="map"></div>
  <div id="popup">
    <div class="pop-head">
      <h3 id="p-id">-</h3>
      <button class="pop-close" onclick="closePopup()">×</button>
    </div>
    <div class="pop-body">
      <div class="pop-row"><span class="pop-k">노선명</span><span class="pop-v" id="p-sub">-</span></div>
      <div class="pop-row"><span class="pop-k">도로유형</span><span class="pop-v" id="p-rtype">-</span></div>
      <div class="pop-row"><span class="pop-k">카테고리</span><span class="pop-v" id="p-cat">-</span></div>
      <div class="pop-row"><span class="pop-k">항목코드</span><span class="pop-v" id="p-cnt">-</span></div>
      <div class="pop-row"><span class="pop-k">drive_type</span><span class="pop-v" id="p-drv">-</span></div>
      <div class="pop-row"><span class="pop-k">검토결과</span><span class="pop-v" id="p-sta">미검토</span></div>
      <div class="pop-row"><span class="pop-k">구간 수</span><span class="pop-v" id="p-seg">-</span></div>
      <button class="pop-dl" onclick="downloadGeoJSON(selIdx)">GeoJSON 다운로드</button>
    </div>
  </div>
</div>

<script>
// ── 전역 상태 ─────────────────────────────────────────────────────────────────
let ROADS = [], SEGMENTS = [], cats = [];
let vis  = new Uint8Array(0);
let map, canvas, ctx;
let curFilter = 'all', selIdx = -1;
let sdkReady  = false, dataReady = false;
let NOTICE_TITLE = '';

const VERSION = new URLSearchParams(window.location.search).get('v');

const COLOR  = {owned:'#27AE60', unowned:'#E74C3C', none:'#888888'};
const SLABEL = {owned:'보유', unowned:'미보유', none:'미검토'};

// ── KV 읽기 ───────────────────────────────────────────────────────────────────
async function loadStatusFromKV() {
  try {
    const resp = await fetch('/api/status?version=' + encodeURIComponent(VERSION));
    const data = await resp.json();
    return data.result ? JSON.parse(data.result) : {};
  } catch(e) { return {}; }
}

// ── KV 쓰기 ───────────────────────────────────────────────────────────────────
async function saveStatusToKV() {
  const statusMap = {};
  ROADS.forEach(function(r, i) {
    if (cats[i] && cats[i] !== 'none') statusMap[r.update_id] = cats[i];
  });
  try {
    const resp = await fetch('/api/status?version=' + encodeURIComponent(VERSION), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: statusMap })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    showToast('저장 완료 — 다른 사용자에게도 즉시 반영됩니다');
  } catch(e) { showToast('저장 실패: ' + e.message); }
}

// ── 데이터 로드 ───────────────────────────────────────────────────────────────
async function loadData() {
  if (!VERSION) { showError('버전이 지정되지 않았습니다.', true); return; }
  try {
    const [resp, kvStatus] = await Promise.all([
      fetch('data/' + VERSION + '.json'),
      loadStatusFromKV()
    ]);
    if (!resp.ok) throw new Error('버전 데이터를 찾을 수 없습니다 (HTTP ' + resp.status + ')');
    const data = await resp.json();

    ROADS    = data.roads    || [];
    SEGMENTS = data.segments || [];

    NOTICE_TITLE = data.title || '';
    const subtitle = (data.title || ('Routo ' + VERSION)) + (data.date ? ' (' + data.date + ')' : '');
    document.title = '타사 도로 검토 뷰어 — ' + VERSION;
    document.getElementById('sb-subtitle').textContent = subtitle;

    // cats 초기화: KV 저장값 우선 → JSON status 참조 → 미검토
    cats = ROADS.map(function(r) {
      if (kvStatus[r.update_id]) return kvStatus[r.update_id];
      const s = r.status || '';
      if (s === '보유'   || s === 'owned')                         return 'owned';
      if (s === '미보유' || s === 'unowned' || s.startsWith('미보유')) return 'unowned';
      return 'none';
    });
    vis = new Uint8Array(ROADS.length).fill(1);

    updateStats();
    dataReady = true;
    tryInitMap();
  } catch(e) { showError(e.message, true); }
}

// ── 상태 변경 (드롭다운) ─────────────────────────────────────────────────────
function setStatus(idx, value, event) {
  if (event) event.stopPropagation();
  cats[idx] = value || 'none';
  // 드롭다운 색상 즉시 반영
  const sel = document.querySelector('[data-idx="' + idx + '"] .status-select');
  if (sel) {
    sel.className = 'status-select' + (value ? ' s-' + value : '');
  }
  // 지도 선 색상도 즉시 반영
  render();
  updateStats();
  if (selIdx === idx) document.getElementById('p-sta').textContent = SLABEL[cats[idx]] || '미검토';
  applyFilters();
}

// ── 통계 업데이트 ─────────────────────────────────────────────────────────────
function updateStats() {
  const cnt = {owned:0, unowned:0, none:0};
  cats.forEach(function(c) { if (cnt[c] !== undefined) cnt[c]++; else cnt.none++; });
  document.getElementById('cnt-all').textContent     = ROADS.length;
  document.getElementById('cnt-owned').textContent   = cnt.owned;
  document.getElementById('cnt-unowned').textContent = cnt.unowned;
  document.getElementById('cnt-none').textContent    = cnt.none;
}

// ── 내보내기 메뉴 ─────────────────────────────────────────────────────────────
function toggleExportMenu(e) {
  e.stopPropagation();
  const m = document.getElementById('export-menu');
  m.style.display = m.style.display === 'block' ? 'none' : 'block';
}
function closeExportMenu() {
  const m = document.getElementById('export-menu');
  if (m) m.style.display = 'none';
}
document.addEventListener('click', closeExportMenu);

// 현재 선택된 필터(전체/보유/미보유/미검토) 기준으로 대상 도로 추출
function getFilteredRoads() {
  return ROADS.map(function(r, i){ return {r, i}; })
    .filter(function(x){ return curFilter === 'all' || cats[x.i] === curFilter; });
}

// 내보내기 파일명: 공지 제목에서 "인포테인먼트 업데이트 안내" 꼬리를 제거 (예: "인포테인먼트 2025년 2차")
function exportBaseName() {
  let base = (NOTICE_TITLE || '')
    .replace(/\s*인포테인먼트\s*업데이트\s*안내\s*$/, '')
    .replace(/\s*업데이트\s*안내\s*$/, '')
    .replace(/[\\/:*?"<>|]/g, '')
    .trim();
  return base || VERSION;
}

// ── 내보내기 (현재 필터 기준으로 JSON 다운로드) ───────────────────────────────
function exportData() {
  closeExportMenu();
  const filtered = getFilteredRoads();

  // 도로 인덱스별 구간 좌표 모음 (각 도로 객체 안에 직접 넣기 위함)
  const segsByRoad = {};
  SEGMENTS.forEach(function(s){
    (segsByRoad[s[1]] = segsByRoad[s[1]] || []).push(s[0]);
  });

  const roadsOut = filtered.map(function(x) {
    const copy = Object.assign({}, x.r);
    copy.status = cats[x.i] === 'owned' ? '보유' : cats[x.i] === 'unowned' ? '미보유' : '';
    copy.segments = segsByRoad[x.i] || [];  // 이 도로의 구간 좌표 목록 [[lon,lat],...]
    return copy;
  });

  const filterLabel = {all:'전체', owned:'보유', unowned:'미보유', none:'미검토'};
  const payload = {
    version: VERSION,
    title: document.getElementById('sb-subtitle').textContent,
    filter: filterLabel[curFilter] || curFilter,
    road_count: roadsOut.length,
    roads: roadsOut
  };

  const suffix = curFilter === 'all' ? '' : ('_' + filterLabel[curFilter]);
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = exportBaseName() + suffix + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast((filterLabel[curFilter] || '전체') + ' ' + roadsOut.length + '개 도로 다운로드 완료');
}

// ── 내보내기 (현재 필터 기준으로 XLSX 다운로드) ───────────────────────────────
// content 예: "경상북도 포항시 포항영덕고속도로 노선 신규 전체개통"
//   → 시:경상북도 / 군:포항시 / 노선명:포항영덕고속도로 / 내용:포항영덕고속도로 노선 신규 전체개통
function parseContentParts(content) {
  const t = (content || '').replace(/\u00a0/g, ' ').trim().split(/\s+/).filter(Boolean);
  return {
    si:    t.length > 0 ? t[0] : '',
    gun:   t.length > 1 ? t[1] : '',
    route: t.length > 2 ? t[2] : '',
    body:  t.length > 2 ? t.slice(2).join(' ') : ''
  };
}

function exportXLSX() {
  closeExportMenu();
  if (typeof XLSX === 'undefined') {
    showToast('엑셀 라이브러리를 불러오지 못했습니다. 새로고침 후 다시 시도해주세요.');
    return;
  }
  const filtered = getFilteredRoads();
  const filterLabel = {all:'전체', owned:'보유', unowned:'미보유', none:'미검토'};

  const aoa = [
    [null, '현대기아업데이트', null, null, null, null, null, null, '아이나비', null, null, null],
    ['순번', '신규/수정', '시', '군', '도로종', '노선명', '내용', '좌표', '반영여부', '업데이트(PND/AIR)', null, '비고']
  ];
  filtered.forEach(function(x, n) {
    const r = x.r;
    const p = parseContentParts(r.content);
    const coord = Array.isArray(r.center) ? r.center.join(', ') : '';
    aoa.push([n + 1, r.category || '', p.si, p.gun, r.road_type || '', p.route, p.body, coord, '', '', null, '']);
  });

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!merges'] = [
    XLSX.utils.decode_range('B1:G1'),
    XLSX.utils.decode_range('I1:L1'),
    XLSX.utils.decode_range('J2:K2')
  ];
  ws['!cols'] = [
    {wch:3.875}, {wch:13}, {wch:15}, {wch:9}, {wch:14.625}, {wch:15.875},
    {wch:50.75}, {wch:23}, {wch:9}, {wch:9.875}, {wch:9.375}, {wch:20}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');

  const suffix = curFilter === 'all' ? '' : ('_' + filterLabel[curFilter]);
  XLSX.writeFile(wb, exportBaseName() + suffix + '.xlsx');
  showToast((filterLabel[curFilter] || '전체') + ' ' + filtered.length + '개 도로 Excel 다운로드 완료');
}

// ── 토스트 알림 ───────────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.style.display = 'none'; }, 2800);
}

function showError(msg, showBack) {
  document.getElementById('init-screen').innerHTML =
    '<div class="init-box"><div class="init-err">' + msg +
    (showBack ? '<br><a href="index.html">← 목록으로 돌아가기</a>' : '') + '</div></div>';
}

// ── SDK + 데이터 준비 완료 시 지도 초기화 ─────────────────────────────────────
function tryInitMap() {
  if (!sdkReady || !dataReady) return;
  if (typeof inavi === 'undefined' || !inavi.maps) { setTimeout(tryInitMap, 100); return; }
  startMapView();
}

function startMapView() {
  document.getElementById('init-screen').style.display = 'none';
  const initCenter = (ROADS.length > 0 && ROADS[0].center) ? ROADS[0].center : [127.0, 37.0];
  map = new inavi.maps.Map({container:'map', center:initCenter, zoom:14}); // eslint-disable-line no-undef
  try { map.on('move',  render); }         catch(e) {}
  try { map.on('zoom',  render); }         catch(e) {}
  try { map.on('click', handleMapClick); } catch(e) {}
  initCanvas();
  requestAnimationFrame(watchLoop);
  setTimeout(render, 200);
  setTimeout(function(){ render(); renderList(); if(ROADS.length>0) showInfo(0); }, 500);
}

// ── Web Mercator 투영 ─────────────────────────────────────────────────────────
function worldPx(lon, lat, zoom) {
  const n = 512 * Math.pow(2, zoom);
  const x = (lon + 180) / 360 * n;
  const s = Math.sin(lat * Math.PI / 180);
  const y = (0.5 - Math.log((1+s)/(1-s)) / (4*Math.PI)) * n;
  return [x, y];
}

// ── Canvas 렌더링 ─────────────────────────────────────────────────────────────
function render() {
  if (!map) return;
  let center, zoom;
  try { center = map.getCenter(); zoom = map.getZoom(); } catch(e) { return; }
  const cx = Array.isArray(center) ? center[0] : (center.lng ?? center.x ?? 127);
  const cy = Array.isArray(center) ? center[1] : (center.lat ?? center.y ?? 37);
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width/dpr, H = canvas.height/dpr;
  const [cpx,cpy] = worldPx(cx,cy,zoom);
  const [tx,ty]   = getMapTranslate();
  const ox = cpx-W/2+tx, oy = cpy-H/2+ty;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save(); ctx.scale(dpr,dpr);
  ctx.lineJoin='round'; ctx.lineCap='round';

  for (let pass=0; pass<2; pass++) {
    for (let si=0; si<SEGMENTS.length; si++) {
      const seg=SEGMENTS[si], path=seg[0], ri=seg[1];
      const isSel=(ri===selIdx);
      if (pass===0&&isSel) continue;
      if (pass===1&&!isSel) continue;
      if (!vis[ri]) continue;
      ctx.beginPath();
      ctx.strokeStyle = isSel ? '#FF6B00' : (COLOR[cats[ri]] || '#888');
      ctx.lineWidth   = isSel ? 5 : 3;
      ctx.globalAlpha = isSel ? 1 : 0.85;
      for (let pi=0; pi<path.length; pi++) {
        const [wx,wy] = worldPx(path[pi][0],path[pi][1],zoom);
        const sx=wx-ox, sy=wy-oy;
        if(pi===0) ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
      }
      ctx.stroke();
    }
  }
  ctx.restore();
}

function getMapTranslate() {
  const t = window.getComputedStyle(document.getElementById('map')).transform;
  if (!t||t==='none') return [0,0];
  const m = t.match(/matrix(?:3d)?\(([^)]+)\)/);
  if (!m) return [0,0];
  const v = m[1].split(',').map(Number);
  if (v.length===6)  return [v[4],v[5]];
  if (v.length===16) return [v[12],v[13]];
  return [0,0];
}

function watchLoop() { render(); requestAnimationFrame(watchLoop); }

function initCanvas() {
  canvas = document.getElementById('overlay');
  const dpr = window.devicePixelRatio || 1;
  function resize() {
    const W=window.innerWidth-320, H=window.innerHeight;
    canvas.width=W*dpr; canvas.height=H*dpr;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    render();
  }
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
}

// ── 지도 클릭 ─────────────────────────────────────────────────────────────────
function handleMapClick(e) {
  if (!map) return;
  let lon, lat;
  try {
    if (e&&e.lngLat)      { lon=e.lngLat.lng??e.lngLat[0]; lat=e.lngLat.lat??e.lngLat[1]; }
    else if (e&&e.coordinate) { [lon,lat]=Array.isArray(e.coordinate)?e.coordinate:[e.coordinate.x,e.coordinate.y]; }
    else if (e&&e.latLng) { lon=e.latLng.getLng?e.latLng.getLng():e.latLng.lng; lat=e.latLng.getLat?e.latLng.getLat():e.latLng.lat; }
  } catch(ex) {}
  if (lon==null) return;
  const zoom=map.getZoom();
  const thr=0.0025/Math.pow(2,Math.max(0,zoom-10));
  let best=thr, bestRi=-1;
  for (let si=0; si<SEGMENTS.length; si++) {
    const seg=SEGMENTS[si], path=seg[0], ri=seg[1];
    if (!vis[ri]) continue;
    for (let pi=0; pi<path.length-1; pi++) {
      const d=ptSegDistGeo(lon,lat,path[pi][0],path[pi][1],path[pi+1][0],path[pi+1][1]);
      if (d<best) { best=d; bestRi=ri; }
    }
  }
  if (bestRi>=0) selectRoad(bestRi);
}

function ptSegDistGeo(px,py,x1,y1,x2,y2) {
  const dx=x2-x1,dy=y2-y1,len2=dx*dx+dy*dy;
  if(len2===0) return Math.hypot(px-x1,py-y1);
  const t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/len2));
  return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}

// ── 필터 ──────────────────────────────────────────────────────────────────────
function setFilter(f) {
  curFilter=f;
  document.querySelectorAll('.sc').forEach(function(el){
    el.className='sc';
    if(el.dataset.f===f) el.classList.add('active-'+f);
  });
  applyFilters();
}

function applyFilters() {
  const q=(document.getElementById('q').value||'').toLowerCase();
  let changed=false;
  ROADS.forEach(function(r,i){
    const match=(curFilter==='all'||cats[i]===curFilter)
      &&(!q||(r.update_id||'').toLowerCase().includes(q)
            ||(r.subject||'').toLowerCase().includes(q)
            ||(r.road_type||'').toLowerCase().includes(q)
            ||(r.content||'').toLowerCase().includes(q));
    const nv=match?1:0;
    if(vis[i]!==nv){ vis[i]=nv; changed=true; }
  });
  if(changed) render();
  renderList();
}

// ── 목록 렌더링 ───────────────────────────────────────────────────────────────
function renderList() {
  const el=document.getElementById('road-list');
  const items=ROADS.map(function(r,i){return{r,i};}).filter(function(x){return vis[x.i];});
  if(!items.length){ el.innerHTML='<div class="no-result">검색 결과 없음</div>'; return; }
  el.innerHTML=items.map(function({r,i}){
    const meta=[r.road_type||r.drive_type,r.category].filter(Boolean).join(' · ');
    const cat=cats[i];
    const selCls=cat&&cat!=='none'?' s-'+cat:'';
    return '<div class="ri'+(selIdx===i?' active':'')+'" data-idx="'+i+'" onclick="selectRoad('+i+')">'+
      '<div class="ri-top">'+
        '<span class="ri-id" title="'+(r.content||'')+'">'+(r.content||r.update_id||'-')+'</span>'+
        '<select class="status-select'+selCls+'" onchange="setStatus('+i+',this.value,event)" onclick="event.stopPropagation()">'+
          '<option value=""'        +(cat==='none'   ?'selected':'')+'>미검토</option>'+
          '<option value="owned"'   +(cat==='owned'  ?'selected':'')+'>보유</option>'+
          '<option value="unowned"' +(cat==='unowned'?'selected':'')+'>미보유</option>'+
        '</select>'+
      '</div>'+
      '<div class="ri-sub">'+(r.update_id||'-')+(r.subject?' · '+r.subject:'')+'</div>'+
      '<div class="ri-meta">'+(meta||'-')+' · '+r.seg_count+'개 구간</div>'+
    '</div>';
  }).join('');
}

// ── 팝업 ──────────────────────────────────────────────────────────────────────
function showInfo(idx) {
  selIdx=idx;
  const r=ROADS[idx];
  document.getElementById('p-id').textContent    = r.content  ||r.update_id||'-';
  document.getElementById('p-sub').textContent   = r.subject  ||'-';
  document.getElementById('p-rtype').textContent = r.road_type||'-';
  document.getElementById('p-cat').textContent   = r.category ||'-';
  document.getElementById('p-cnt').textContent   = r.update_id||'-';
  document.getElementById('p-drv').textContent   = r.drive_type||'-';
  document.getElementById('p-sta').textContent   = SLABEL[cats[idx]]||'미검토';
  document.getElementById('p-seg').textContent   = r.seg_count+'개';
  document.getElementById('popup').style.display ='block';
  renderList();
  setTimeout(function(){
    const a=document.querySelector('.ri.active');
    if(a) a.scrollIntoView({behavior:'smooth',block:'nearest'});
  },60);
}

function selectRoad(idx) {
  selIdx=idx;
  const c=ROADS[idx].center;
  try{ map.setCenter(c); map.setZoom(15); }catch(e){}
  render(); showInfo(idx);
}

function closePopup(){ document.getElementById('popup').style.display='none'; }

// ── GeoJSON 다운로드 ──────────────────────────────────────────────────────────
function downloadGeoJSON(idx) {
  if(idx<0||idx>=ROADS.length) return;
  const r=ROADS[idx];
  const segs=SEGMENTS.filter(function(s){return s[1]===idx;}).map(function(s){return s[0];});
  if(!segs.length) return;
  const geometry=segs.length===1?{type:'LineString',coordinates:segs[0]}:{type:'MultiLineString',coordinates:segs};
  const fc={type:'FeatureCollection',features:[{type:'Feature',geometry:geometry,
    properties:{update_id:r.update_id||'',subject:r.subject||'',
      drive_type:r.drive_type||'',road_type:r.road_type||'',
      category:r.category||'',content:r.content||'',
      status:cats[idx]==='owned'?'보유':cats[idx]==='unowned'?'미보유':''}}]};
  const blob=new Blob([JSON.stringify(fc,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=(r.update_id||'road')+'.geojson';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
